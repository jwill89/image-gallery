name: CI

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (PHP / Slim)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.5']
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_sqlite, curl, gd, mbstring
          tools: composer
          coverage: pcov

      - name: Cache Composer packages
        uses: actions/cache@v6
        with:
          path: backend/vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Verify OpenAPI spec is current
        run: |
          composer docs
          git diff --exit-code openapi.json

      - name: Lint (phpcs / PSR-12)
        run: composer lint

      - name: Static analysis (PHPStan level 8)
        run: composer analyse

      - name: Test (PHPUnit + coverage)
        run: composer test:coverage

  frontend:
    name: Frontend (Vue / Vite)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['24']
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive # frontend/eslint-config (shared @jwill89/eslint-config)
          # The default GITHUB_TOKEN can't read the private eslint-config repo, so
          # supply a PAT with read access to both repos (checkout reuses it for
          # submodule fetches on github.com). Falls back to GITHUB_TOKEN locally.
          token: ${{ secrets.ESLINT_CONFIG_TOKEN || github.token }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify generated API types are current
        run: |
          npm run gen:types
          git diff --exit-code src/types/api.generated.ts

      - name: Lint (ESLint, type-checked)
        run: npm run lint

      - name: Check formatting (Prettier)
        run: npm run format:check

      - name: Type-check & build
        run: npm run build

      - name: Test (Vitest + coverage)
        run: npm run test:coverage

  # On a push to the default branch, AFTER the gate passes, tag + release the
  # project version if it has no release yet. Tag = v<version> (frontend/
  # package.json); release body = the CHANGELOG "## [<version>]" section — so a
  # green version bump auto-publishes a release linked to its notes. Idempotent:
  # a version already released is skipped, so ordinary pushes are a no-op.
  release:
    name: Tag + release (on version bump)
    needs: [backend, frontend]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # need existing tags to detect what's already released

      - name: Tag + release on version bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/release.sh
